# MUDitM config for Docker test environment
# Listens on 2026 (TLS auto-detect), forwards to MUD on 2027

[muditm]
demon = true
listen = 2026
listen-backlog = 16
max-children = 100
log-file =
newenv_ipaddress = IPADDRESS

[ssl]
cert = /home/mud/certs/fullchain.pem
key = /home/mud/certs/privkey.pem

[game]
host = 127.0.0.1
service = 2027
security = none
compression = enable

[client]
security = auto
compression = enable

[skmud]
control_socket = /home/mud/SKMUD/control/control.sock
