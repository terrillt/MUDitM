# MUDitM config for production
# Listens on 1996 (public, TLS auto-detect), forwards to MUD on 1997

[muditm]
demon = true
listen = 1996
listen-backlog = 16
max-children = 900
log-file = /home/mud/SKMUD/log/muditm.log
newenv_ipaddress = IPADDRESS
newenv_immediate_ip = true
newenv_fallback = true
newenv_fallback_ms = 2000

[ssl]
cert = /home/mud/SKMUD/certs/fullchain.pem
key = /home/mud/SKMUD/certs/privkey.pem

[game]
host = 127.0.0.1
service = 1997
security = none
compression = enable

[client]
security = auto
compression = enable

[skmud]
control_socket = /home/mud/SKMUD/control/control.sock
