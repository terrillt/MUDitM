# MUDitM config for CI environment
# Listens on 1996 (TLS auto-detect), forwards to MUD on 1997

[muditm]
demon = true
listen = 1996
log-file =
newenv_ipaddress = IPADDRESS

[ssl]
cert = /home/mud/certs/fullchain.pem
key = /home/mud/certs/privkey.pem

[game]
host = 127.0.0.1
service = 1997
security = none
compression = enable

[client]
security = auto
compression = enable

[skmud]
control_socket = /home/mud/SKMUD/control/control.sock
